<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cronología Personal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #0f3460;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(15, 52, 96, 0.4);
        }

        #resultado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        #resultado.mostrar {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .resultado-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .etapa {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .etapa-ninez { background: #ffeaaf; color: #856404; }
        .etapa-adolescencia { background: #a29bfe; color: #fff; }
        .etapa-adultez { background: #74b9ff; color: #fff; }
        .etapa-jubilacion { background: #55efc4; color: #006266; }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .historial {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .historial h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .historial-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #0f3460;
        }

        .historial-item .año {
            font-weight: 600;
            color: #1a1a2e;
        }

        .historial-item .edad {
            color: #666;
            font-size: 0.9rem;
        }

        .btn-limpiar {
            background: #e74c3c;
            margin-top: 10px;
        }

        .btn-limpiar:hover {
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 Cronología Personal</h1>
        <p class="subtitle">Descubre tu edad en cualquier año</p>

        <div class="input-group">
            <label for="nacimiento">📅 ¿En qué año naciste?</label>
            <input type="number" id="nacimiento" placeholder="Ej: 1995" min="1900" max="2026">
        </div>

        <div class="input-group">
            <label for="consulta">🔍 ¿Qué año quieres consultar?</label>
            <input type="number" id="consulta" placeholder="Ej: 2025" min="1900" max="2100">
        </div>

        <button onclick="calcular()">Calcular Edad</button>
        <div class="error" id="error"></div>

        <div id="resultado">
            <div class="resultado-header" id="resultado-texto"></div>
            <div id="etapa-container"></div>
        </div>

        <div class="historial" id="historial" style="display: none;">
            <h3>📋 Historial de consultas</h3>
            <div id="historial-lista"></div>
            <button class="btn-limpiar" onclick="limpiarHistorial()">🗑️ Limpiar Historial</button>
        </div>
    </div>

    <script>
        let añoNacimiento = null;
        const historial = [];

        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = mensaje;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function obtenerEtapa(edad) {
            if (edad < 0) return null;
            if (edad < 12) return { nombre: 'Niñez 🧸', clase: 'etapa-ninez' };
            if (edad < 18) return { nombre: 'Adolescencia 🛹', clase: 'etapa-adolescencia' };
            if (edad < 65) return { nombre: 'Adultez (Etapa productiva) 💼', clase: 'etapa-adultez' };
            return { nombre: 'Jubilación (Tercera edad) 🌅', clase: 'etapa-jubilacion' };
        }

        function calcular() {
            const inputNacimiento = document.getElementById('nacimiento');
            const inputConsulta = document.getElementById('consulta');
            const nacimiento = parseInt(inputNacimiento.value);
            const consulta = parseInt(inputConsulta.value);

            // Validación
            if (!nacimiento || nacimiento < 1900 || nacimiento > 2026) {
                mostrarError('❌ Por favor, ingresa un año de nacimiento válido (1900-2026)');
                return;
            }

            if (!consulta || consulta < 1900 || consulta > 2100) {
                mostrarError('❌ Por favor, ingresa un año a consultar válido (1900-2100)');
                return;
            }

            añoNacimiento = nacimiento;
            const resultadoDiv = document.getElementById('resultado');
            const resultadoTexto = document.getElementById('resultado-texto');
            const etapaContainer = document.getElementById('etapa-container');

            let mensaje = '';
            let etapaInfo = null;

            if (consulta < nacimiento) {
                const espera = nacimiento - consulta;
                mensaje = `⏳ En el año ${consulta}, aún faltaban ${espera} años para que nacieras.<br><small>¡Era una época antes de tu tiempo!</small>`;
            } else {
                const edad = consulta - nacimiento;
                etapaInfo = obtenerEtapa(edad);

                if (consulta === nacimiento) {
                    mensaje = `👶 En el año ${consulta}, ¡estabas naciendo!`;
                } else {
                    mensaje = `🎯 En el año ${consulta} tenías (o tendrás) <strong>${edad} años</strong>`;
                }
            }

            resultadoTexto.innerHTML = mensaje;

            if (etapaInfo) {
                etapaContainer.innerHTML = `<span class="etapa ${etapaInfo.clase}">${etapaInfo.nombre}</span>`;
            } else {
                etapaContainer.innerHTML = '';
            }

            resultadoDiv.classList.add('mostrar');

            // Agregar al historial
            if (consulta !== nacimiento) {
                historial.unshift({ año: consulta, mensaje: mensaje });
                actualizarHistorial();
            }
        }

        function actualizarHistorial() {
            const historialDiv = document.getElementById('historial');
            const listaDiv = document.getElementById('historial-lista');

            if (historial.length === 0) {
                historialDiv.style.display = 'none';
                return;
            }

            historialDiv.style.display = 'block';
            listaDiv.innerHTML = historial.map(item => `
                <div class="historial-item">
                    <div class="año">📅 ${item.año}</div>
                    <div class="edad">${item.mensaje}</div>
                </div>
            `).join('');
        }

        function limpiarHistorial() {
            historial.length = 0;
            document.getElementById('historial').style.display = 'none';
            document.getElementById('resultado').classList.remove('mostrar');
        }

        // Permitir Enter para calcular
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calcular();
            }
        });
    </script>
</body>
</html>
